<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Align Characters — Unified Yi</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="header">
    <h1>𖬝 Unified Yi <span class="yi-demo">ꆈꌠ</span></h1>
    <nav>
        <a href="/">📚 Browse</a>
        <a href="/align.html" class="active">🔗 Align</a>
    </nav>
</header>

<div class="container">

    <!-- Source Selectors -->
    <div class="toolbar" style="justify-content:center;gap:20px;margin-bottom:20px;">
        <div>
            <label style="font-weight:600;margin-right:8px;">Source A:</label>
            <select id="sourceSelectA" onchange="alignState.sourceA=this.value;alignState.charA=null;alignState.pageA=1;updateCharDisplay('A');updateComparePanel();loadCharsA();">
            </select>
        </div>
        <button onclick="switchSources()" style="font-size:20px;" title="Swap sources">⇄</button>
        <div>
            <label style="font-weight:600;margin-right:8px;">Source B:</label>
            <select id="sourceSelectB" onchange="alignState.sourceB=this.value;alignState.charB=null;alignState.pageB=1;updateCharDisplay('B');updateComparePanel();loadCharsB();">
            </select>
        </div>
    </div>

    <!-- Main Alignment Layout -->
    <div class="align-layout">
        <!-- Panel A -->
        <div class="align-panel">
            <h3>
                <span>Source A: <span id="sourceLabelA">—</span></span>
                <span style="font-size:12px;color:var(--text-secondary);">(<span id="totalLabelA">0</span>)</span>
            </h3>
            <div class="glyph-display" id="charDisplayA">?</div>
            <div class="char-info" id="charInfoA">
                <div style="color:var(--text-secondary)">Select a character</div>
            </div>
            <div style="margin-top:12px;">
                <input type="text" id="searchA" placeholder="Search..." style="width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:4px;"
                       onkeydown="if(event.key==='Enter')doSearchPanel('A')">
            </div>
            <div style="max-height:300px;overflow-y:auto;margin-top:8px;">
                <table class="char-table" style="font-size:12px;">
                    <thead><tr><th style="width:40px;">字</th><th>Ref</th><th>音</th></tr></thead>
                    <tbody id="charListA"></tbody>
                </table>
            </div>
            <div class="pagination" id="paginationA" style="margin-top:8px;"></div>
            <div id="suggestionsA" style="margin-top:12px;"></div>
        </div>

        <!-- Panel B -->
        <div class="align-panel">
            <h3>
                <span>Source B: <span id="sourceLabelB">—</span></span>
                <span style="font-size:12px;color:var(--text-secondary);">(<span id="totalLabelB">0</span>)</span>
            </h3>
            <div class="glyph-display" id="charDisplayB">?</div>
            <div class="char-info" id="charInfoB">
                <div style="color:var(--text-secondary)">Select a character</div>
            </div>
            <div style="margin-top:12px;">
                <input type="text" id="searchB" placeholder="Search..." style="width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:4px;"
                       onkeydown="if(event.key==='Enter')doSearchPanel('B')">
            </div>
            <div style="max-height:300px;overflow-y:auto;margin-top:8px;">
                <table class="char-table" style="font-size:12px;">
                    <thead><tr><th style="width:40px;">字</th><th>Ref</th><th>音</th></tr></thead>
                    <tbody id="charListB"></tbody>
                </table>
            </div>
            <div class="pagination" id="paginationB" style="margin-top:8px;"></div>
            <div id="suggestionsB" style="margin-top:12px;"></div>
        </div>
    </div>

    <!-- Action Bar -->
    <div style="text-align:center;margin-bottom:20px;">
        <button class="btn btn-primary" onclick="createAlignment()" style="font-size:18px;padding:12px 32px;">
            🔗 Link These Characters
        </button>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">Ctrl+Enter to link</div>
    </div>

    <!-- Comparison Panel -->
    <div class="compare-panel">
        <h3 style="margin-bottom:12px;color:var(--accent);">📊 Comparison Details</h3>
        <div id="compareContent">
            <p style="color:var(--text-secondary)">Select characters from both sides to compare</p>
        </div>
    </div>

    <!-- Existing Alignments -->
    <section style="margin-top:24px;">
        <h2 style="color:var(--text-secondary);font-size:15px;margin-bottom:8px;">
            📋 Existing Links (<span id="existingCount">0</span>)
        </h2>
        <div class="char-table-wrap">
            <table class="char-table">
                <thead>
                    <tr>
                        <th style="width:50px;">A</th>
                        <th>Source A</th>
                        <th style="width:30px;"></th>
                        <th style="width:50px;">B</th>
                        <th>Source B</th>
                        <th style="width:50px;"></th>
                    </tr>
                </thead>
                <tbody id="existingAlignBody">
                    <tr><td colspan="6" style="text-align:center;padding:20px;"><span class="spinner"></span></td></tr>
                </tbody>
            </table>
        </div>
    </section>

</div>

<script src="/js/align.js"></script>
</body>
</html>
