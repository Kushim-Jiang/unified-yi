<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>录入系统 — Unified Yi</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* ── Grid layout override ── */
        .entry-layout { margin-bottom: 16px; }

        .rules-list {
            font-size: 12px;
            color: var(--text-secondary);
            padding: 8px 12px;
            background: var(--accent-bg);
            border-radius: var(--radius);
            margin-bottom: 12px;
            line-height: 1.8;
        }
        .rules-list code {
            background: var(--surface);
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 12px;
            border: 1px solid var(--border);
        }

        .switch-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .switch-wrap input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        /* ── Entry table ── */
        .entry-table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow-x: auto;
            box-shadow: var(--shadow);
        }
        .entry-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        .entry-table thead th {
            background: var(--accent-bg);
            padding: 10px 8px;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
            color: var(--accent);
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
            position: sticky;
            top: 0;
        }
        .entry-table thead th:first-child { width: 50px; }
        .entry-table thead th:nth-child(2) { width: 70px; }
        .entry-table thead th:nth-child(3) { width: 130px; }
        /* col 4 (meaning) gets remaining width */

        .entry-table tbody td {
            padding: 6px 8px;
            border-bottom: 1px solid #efe8d8;
            vertical-align: middle;
            text-align: center;
            font-size: 14px;
            transition: background 0.15s;
        }
        .entry-table tbody tr:hover td {
            background: #fdf9f2;
        }
        .entry-table .col-idx {
            font-size: 12px;
            color: var(--text-secondary);
            user-select: none;
        }
        .entry-table .col-glyph {
            font-family: 'YiFont';
            font-size: 26px;
            text-align: center;
            line-height: 1.2;
            padding: 4px 4px;
        }
        .entry-table .col-ref {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Editable cells ── */
        .entry-table .cell-editable {
            cursor: text;
            border-radius: 4px;
            padding: 4px 6px;
            min-height: 28px;
            text-align: left;
            word-break: break-word;
            transition: background 0.15s, box-shadow 0.15s;
        }
        .entry-table .cell-editable:hover {
            background: #fff9e6;
            box-shadow: inset 0 0 0 1px var(--accent-light);
        }
        .entry-table .cell-editable:focus-within {
            background: #fff;
            box-shadow: inset 0 0 0 2px var(--accent);
        }
        .entry-table .cell-editable.editing {
            padding: 0;
        }
        .entry-table .cell-editable .edit-input,
        .entry-table .cell-editable .edit-textarea {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-size: 14px;
            font-family: inherit;
            color: var(--text);
            padding: 4px 6px;
            resize: none;
            box-sizing: border-box;
            line-height: 1.5;
        }
        .entry-table .cell-editable .edit-textarea {
            min-height: 28px;
        }
        .entry-table .cell-editable .cell-save-indicator {
            font-size: 10px;
            color: var(--success);
            display: inline-block;
            margin-left: 4px;
            animation: fadeInOut 1.5s ease;
        }
        .entry-table .cell-editable .cell-save-error {
            color: var(--danger);
        }
        @keyframes fadeInOut {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ── Pagination ── */
        .entry-pagination {
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: center;
            margin-top: 14px;
            flex-wrap: wrap;
        }
        .entry-pagination button {
            padding: 5px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            cursor: pointer;
            font-size: 13px;
            color: var(--text);
            transition: all 0.15s;
        }
        .entry-pagination button:hover:not(:disabled) {
            background: var(--accent-bg);
            border-color: var(--accent-light);
        }
        .entry-pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .entry-pagination button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .entry-pagination .page-info {
            font-size: 12px;
            color: var(--text-secondary);
            margin: 0 4px;
        }

        /* ── Stats bar ── */
        .entry-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
            padding: 6px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .entry-stats .save-queue {
            font-size: 11px;
        }
        .entry-stats .save-queue.saving {
            color: var(--info);
        }
        .entry-stats .save-queue.done {
            color: var(--success);
        }
        .entry-stats .save-queue.error {
            color: var(--danger);
        }

        /* ── Empty state ── */
        .entry-empty {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .entry-empty .empty-icon {
            font-size: 40px;
            display: block;
            margin-bottom: 12px;
        }

        @media (max-width: 768px) {
            .entry-table thead th:nth-child(1) { width: 36px; }
            .entry-table thead th:nth-child(2) { width: 50px; }
            .entry-table thead th:nth-child(3) { width: 100px; }
            .entry-table .col-glyph { font-size: 22px; }
            .entry-stats { flex-direction: column; gap: 4px; }
        }
    </style>
</head>
<body>

<header class="header">
    <h1>Unified Yi <span class="yi-demo">ꆈꌠ</span></h1>
    <nav>
        <a href="/">📚 Browse</a>
        <a href="/align.html">🔗 Align</a>
        <a href="/groups.html">📋 Groups</a>
        <a href="/entry.html" class="active">✏️ Entry</a>
    </nav>
</header>

<div class="container">

    <!-- ─── Toolbar ─── -->
    <div class="toolbar" style="margin-bottom:16px;">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex:1;">
            <label style="font-size:13px;font-weight:600;color:var(--text-secondary);white-space:nowrap;">来源：</label>
            <select id="sourceSelect" style="padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--bg);">
                <option value="">— 选择来源 —</option>
            </select>
            <span id="totalInfo" style="font-size:12px;color:var(--text-secondary);"></span>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
            <span id="loadStatus" style="font-size:12px;color:var(--text-secondary);"></span>
            <button class="btn btn-sm" onclick="entryApp.jumpToRef()">🔍 跳转 Ref</button>
            <input type="text" id="refInput" placeholder="Ref (如 Q0-00101)" style="padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--bg);width:120px;">
        </div>
    </div>

    <div style="margin-bottom:12px;">
        <h2 style="font-size:16px;margin-bottom:4px;">✏️ 批量录入</h2>
        <p style="font-size:13px;color:var(--text-secondary);">
            点击注音或释义单元格直接编辑，自动格式化后保存到 TSV 文件。
        </p>
    </div>

    <div class="switch-wrap">
        <input type="checkbox" id="autoFormat" checked>
        <label for="autoFormat">编辑时实时自动格式化</label>
    </div>

    <!-- ─── Table ─── -->
    <div class="entry-table-wrap" id="entryTableWrap">
        <div class="entry-empty" id="entryEmpty">
            <span class="empty-icon">📋</span>
            请先选择一个来源
        </div>
        <table class="entry-table" id="entryTable" style="display:none;">
            <thead>
                <tr>
                    <th>#</th>
                    <th>字形</th>
                    <th>注音 Pronunciation</th>
                    <th>释义 Meaning</th>
                </tr>
            </thead>
            <tbody id="entryTableBody"></tbody>
        </table>
    </div>

    <!-- ─── Pagination ─── -->
    <div class="entry-pagination" id="entryPagination" style="display:none;"></div>

    <!-- ─── Stats ─── -->
    <div class="entry-stats" id="entryStats" style="display:none;">
        <span id="statsInfo"></span>
        <span class="save-queue" id="saveStatus"></span>
    </div>

    <!-- ─── Quick reference ─── -->
    <section style="margin-top:16px;">
        <details style="font-size:13px;color:var(--text-secondary);">
            <summary style="cursor:pointer;font-weight:600;">📖 查看已有数据格式示例</summary>
            <div style="margin-top:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-size:12px;line-height:2;">
                <table class="char-table" style="font-size:12px;">
                    <thead><tr><th>注音</th><th>释义</th><th>说明</th></tr></thead>
                    <tbody>
                        <tr><td style="font-family:'Gentium Plus',serif;">pi⁵⁵</td><td>关，闭。</td><td>简单释义</td></tr>
                        <tr><td style="font-family:'Gentium Plus',serif;">pi³³</td><td>（形容词缀）〖尖溜溜〗。</td><td>带括号注释 + 〖〗</td></tr>
                        <tr><td style="font-family:'Gentium Plus',serif;">pi¹³</td><td>根由。〖格言，谚语〗。</td><td>多句 + 〖〗</td></tr>
                        <tr><td style="font-family:'Gentium Plus',serif;">pi¹³</td><td>雄性（指禽类）。〖布拖〗（县名）。</td><td>混合格式</td></tr>
                        <tr><td style="font-family:'Gentium Plus',serif;">ʔæ⁵⁵</td><td>ai。〖艾滋病〗，〖爱辉〗。</td><td>连续〖〗用逗号分隔</td></tr>
                    </tbody>
                </table>
            </div>
        </details>
    </section>

</div>

<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/entry.js"></script>
</body>
</html>
